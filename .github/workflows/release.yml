name: Release

on:
  schedule:
    # Mondays at 08:00 Africa/Johannesburg / 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release scope
        id: scope
        env:
          REQUESTED_RELEASE_TYPE: ${{ github.event.inputs.release_type || 'patch' }}
        run: |
          SHOULD_RELEASE=true
          LAST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [ "${{ github.event_name }}" = "schedule" ] && [ -n "${LAST_TAG}" ]; then
            if git diff --quiet "${LAST_TAG}..HEAD" -- \
              upkeepify.php \
              uninstall.php \
              readme.txt \
              LICENSE.md \
              upkeepify-styles.css \
              favicon.png \
              icon-192x192.png \
              icon-512x512.png \
              includes \
              js \
              languages; then
              SHOULD_RELEASE=false
            fi
          fi

          echo "should_release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "release_type=${REQUESTED_RELEASE_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Skip unchanged scheduled release
        if: steps.scope.outputs.should_release != 'true'
        run: echo "No plugin runtime changes since the latest release tag. Skipping release."

      - uses: shivammathur/setup-php@v2
        if: steps.scope.outputs.should_release == 'true'
        with:
          php-version: '8.3'
          tools: composer

      - uses: actions/setup-node@v4
        if: steps.scope.outputs.should_release == 'true'
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Composer dependencies
        if: steps.scope.outputs.should_release == 'true'
        run: composer install --prefer-dist --no-progress

      - name: Install npm dependencies
        if: steps.scope.outputs.should_release == 'true'
        run: npm ci

      - name: Run PHPUnit tests
        if: steps.scope.outputs.should_release == 'true'
        run: ./vendor/bin/phpunit

      - name: Check PHP syntax
        if: steps.scope.outputs.should_release == 'true'
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" | xargs -n1 php -l

      - name: Audit Composer dependencies
        if: steps.scope.outputs.should_release == 'true'
        run: composer audit

      - name: Build JS assets
        if: steps.scope.outputs.should_release == 'true'
        run: npm run build

      - name: Bump version
        if: steps.scope.outputs.should_release == 'true'
        run: npm run version:${{ steps.scope.outputs.release_type }}

      - name: Verify version metadata
        if: steps.scope.outputs.should_release == 'true'
        run: npm run version:check

      - name: Read release version
        if: steps.scope.outputs.should_release == 'true'
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          MAJOR="${VERSION%%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_tag=v${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.scope.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json upkeepify.php readme.txt
          git commit -m "Release v${{ steps.version.outputs.version }}"

      - name: Create tags
        if: steps.scope.outputs.should_release == 'true'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git tag -f "${{ steps.version.outputs.major_tag }}"
          git tag -f latest

      - name: Build release archive
        if: steps.scope.outputs.should_release == 'true'
        run: npm run package:release

      - name: Locate release archive
        if: steps.scope.outputs.should_release == 'true'
        id: archive
        run: |
          ARCHIVE="$(ls "upkeepify-${{ steps.version.outputs.version }}"-*-slim.zip | head -n 1)"
          echo "path=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tags
        if: steps.scope.outputs.should_release == 'true'
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"
          git push --force origin "${{ steps.version.outputs.major_tag }}"
          git push --force origin latest

      - name: Publish GitHub release
        if: steps.scope.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.archive.outputs.path }}" \
            --title "Upkeepify v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest

      - name: Prune old releases
        if: steps.scope.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Keep last 2 major version lines, last 3 releases per major; delete the rest.
          RELEASES=$(gh release list --limit 200 \
            --json tagName,isDraft,isPrerelease \
            --jq '.[] | select(.isDraft == false and .isPrerelease == false) | .tagName' | \
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -rV)

          declare -A major_count
          majors_seen=0

          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            major="${tag%%.*}"

            if [[ -z "${major_count[$major]+_}" ]]; then
              major_count[$major]=0
              majors_seen=$((majors_seen + 1))
            fi

            major_count[$major]=$((major_count[$major] + 1))

            if [[ $majors_seen -gt 2 || ${major_count[$major]} -gt 3 ]]; then
              echo "Pruning $tag"
              gh release delete "$tag" --yes --cleanup-tag || true
            fi
          done <<< "$RELEASES"
