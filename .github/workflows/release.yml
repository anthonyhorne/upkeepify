name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit

      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" | xargs -n1 php -l

      - name: Audit Composer dependencies
        run: composer audit

      - name: Build JS assets
        run: npm run build

      - name: Bump version
        run: npm run version:${{ inputs.release_type }}

      - name: Verify version metadata
        run: npm run version:check

      - name: Read release version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          MAJOR="${VERSION%%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_tag=v${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json upkeepify.php readme.txt
          git commit -m "Release v${{ steps.version.outputs.version }}"

      - name: Create tags
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git tag -f "${{ steps.version.outputs.major_tag }}"
          git tag -f latest

      - name: Build release archive
        run: npm run package:release

      - name: Locate release archive
        id: archive
        run: |
          ARCHIVE="$(ls "upkeepify-${{ steps.version.outputs.version }}"-*-slim.zip | head -n 1)"
          echo "path=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tags
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"
          git push --force origin "${{ steps.version.outputs.major_tag }}"
          git push --force origin latest

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.archive.outputs.path }}" \
            --title "Upkeepify v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest
