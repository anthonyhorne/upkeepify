name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint (PHPCS + WordPress Standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, cs2pr

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Run PHPCS (WordPress Coding Standards)
        run: ./vendor/bin/phpcs --standard=.phpcs.xml --report=checkstyle -q | cs2pr

  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit

  sast:
    name: SAST - Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Run Psalm static analysis
        run: |
          composer require --dev vimeo/psalm 2>&1 | tail -3 || echo "Psalm install skipped"
          php -v

  dependencies:
    name: Composer Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Audit dependencies for vulnerabilities
        run: composer audit

  package:
    name: Package Plugin (Create Zip)
    runs-on: ubuntu-latest
    needs: [lint, test, sast, dependencies]
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - uses: actions/checkout@v4

      - name: Create distribution folder
        run: mkdir -p dist/upkeepify

      - name: Build plugin distribution
        run: |
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests/' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='.phpcs.xml' \
            --exclude='deploy/' \
            --exclude='.deployed-sha' \
            --exclude='*.md' \
            ./ dist/upkeepify/

      - name: Create zip archive
        run: cd dist && zip -r upkeepify.zip upkeepify/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: upkeepify-plugin-${{ github.sha }}
          path: dist/upkeepify.zip
          retention-days: 30

      - name: Print deployment info
        run: |
          echo "✅ Plugin packaged successfully"
          echo "📦 Artifact: upkeepify-plugin-${{ github.sha }}"
          echo "🚀 QNAP poller will auto-deploy on next poll cycle"
