name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit

  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" | xargs -n1 php -l

  dependencies:
    name: Composer Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Audit dependencies for vulnerabilities
        run: composer audit

  js-build:
    name: JS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build JS assets
        run: npm run build

  package:
    name: Package Plugin
    runs-on: ubuntu-latest
    needs: [test, lint, dependencies, js-build]
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build JS assets
        run: npm run build

      - name: Create distribution folder
        run: mkdir -p dist/upkeepify

      - name: Build plugin distribution
        run: |
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests/' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='.phpcs.xml' \
            --exclude='deploy/' \
            --exclude='node_modules/' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='build.js' \
            --exclude='docs/' \
            --exclude='REFACTORING_SUMMARY.md' \
            --exclude='PERFORMANCE_COMPLETE.md' \
            --exclude='PERFORMANCE_IMPLEMENTATION_SUMMARY.md' \
            --exclude='ACCEPTANCE_CRITERIA_CHECKLIST.md' \
            ./ dist/upkeepify/

      - name: Create zip archive
        run: cd dist && zip -r upkeepify.zip upkeepify/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: upkeepify-plugin-${{ github.sha }}
          path: dist/upkeepify.zip
          retention-days: 30
